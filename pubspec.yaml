name: any_planner
description: "Jot it down. Sort it later. See your day, clearly."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  firebase_core: ^3.6.0
  cloud_firestore: ^5.6.0
  firebase_auth: ^5.3.0
  google_sign_in: ^6.2.1
  google_fonts: ^6.2.1
  go_router: ^14.8.1
  uuid: ^4.5.1
  path_provider: ^2.1.5
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  freezed: ^2.5.7
  json_serializable: ^6.9.4
  build_runner: ^2.4.14

flutter:
  uses-material-design: true
